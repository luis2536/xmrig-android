name: Compilar APK Android

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente base (sin submódulos bloqueantes)
      - name: Descargar código fuente
        uses: actions/checkout@v4
        with:
          submodules: false

      # 2. Configurar entorno Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Configurar Android SDK y NDK para C++
      - name: Configurar NDK y Android SDK
        uses: android-actions/setup-android@v3

      # 4. Garantizar el código nativo de XMRig (Sustituye submódulos rotos)
      - name: Preparar código fuente de XMRig
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive || true
          
          # Si la carpeta del motor C++ está vacía, clona el repositorio oficial de XMRig
          if [ -d "app/src/main/cpp" ] && [ ! -f "app/src/main/cpp/xmrig/CMakeLists.txt" ]; then
            echo "Submódulo incompleto o roto. Descargando XMRig oficial..."
            rm -rf app/src/main/cpp/xmrig
            git clone --depth 1 https://github.com/xmrig/xmrig.git app/src/main/cpp/xmrig
          fi

      # 5. Otorgar permisos de ejecución a Gradle
      - name: Dar permisos de ejecución a Gradlew
        run: chmod +x gradlew

      # 6. Compilar APK en modo Debug
      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon

      # 7. Subir el paquete APK a la sección de Artefactos
      - name: Subir APK lista para descargar
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-android-debug
          path: app/build/outputs/apk/debug/*.apk
