name: Compilar APK Android

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente base (ignora submódulos conflictivos)
      - name: Descargar código fuente
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # 2. Configurar entorno Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Descargar el motor XMRig en C++ de forma limpia
      - name: Instalar Motor C++ de XMRig
        run: |
          echo "Limpiando directorio C++..."
          rm -rf app/src/main/cpp/xmrig
          echo "Clonando repositorio XMRig oficial..."
          git clone --depth 1 https://github.com/xmrig/xmrig.git app/src/main/cpp/xmrig

      # 4. Asignar permisos y compilar APK con Gradle
      - name: Compilar APK con Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 5. Exportar la APK compilada para descargar
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-android-debug
          path: app/build/outputs/apk/debug/*.apk
