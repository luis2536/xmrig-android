name: Compilar APK Android

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código base sin submódulos bloqueantes
      - name: Descargar código fuente
        uses: actions/checkout@v4
        with:
          submodules: false

      # 2. Reemplazar SSH por HTTPS y actualizar submódulos sin detener el flujo
      - name: Corregir permisos de submódulos y sincronizar
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule init
          git submodule update --recursive || true

      # 3. Configurar entorno Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Configurar Android SDK y NDK
      - name: Configurar NDK y Android SDK
        uses: android-actions/setup-android@v3

      # 5. Permisos de ejecución a Gradle
      - name: Dar permisos de ejecución a Gradlew
        run: chmod +x gradlew

      # 6. Compilar APK
      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon

      # 7. Exportar APK lista para descargar
      - name: Subir APK lista
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-android-debug
          path: app/build/outputs/apk/debug/*.apk
